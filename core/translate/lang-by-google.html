	<form method="post">

	<script>
'use strict';

function emojiFlag(lang) {
	// https://emojipedia.org/flags/
	// https://en.wikipedia.org/wiki/List_of_ISO_639-2_codes
	// https://iso639-3.sil.org/sites/iso639-3/files/downloads/iso-639-3.tab
	const lang2flag = {
		af: 'ZA',
		zu: 'ZA',
		xh: 'ZA',
		en: 'GB',
		oc: 'FR', // 'рџЏґfrocc'
		be: 'BY', // BiГ©lorussie
		ca: 'ES', // 'рџЏґу ЃҐу Ѓіу ЃЈу Ѓґу Ѓї'у ЃҐу Ѓіу ЃЈу Ѓґу Ѓї 'рџЏґesct' Catalogne
		ga: 'IE',
		da: 'DK',
		ka: 'GE',
		gl: 'ES', // 'рџЏґesga',
		cy: 'рџЏґу Ѓ§у Ѓўу Ѓ·у Ѓ¬у Ѓіу Ѓї', // Pays de Galles Wales
		gd: 'рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї', // 'рџЏґgbsct', Scotland
		sq: 'AL',
		eu: 'ES', // 'рџЏґespv', // Euskadi Pays Basque
		rom: 'RO',
		hy: 'AM',
		ko: 'KR',
		nn: 'NO',
		nb: 'NO',
		he: 'IL',
		ja: 'JP',
		el: 'GR',
		ff: 'NE', // 'рџ‡Єрџ‡­' Peul
		haw: 'рџЏґу Ѓµу Ѓіу ЃЁу Ѓ©у Ѓї', // 'рџЏґushiу Ѓїу Ѓї U+E007F Hawaii
		hi: 'IN',
		co: 'рџЏґу Ѓ¦у ЃІу ЃЈу ЃЇу ЃІу Ѓї',
		fil: 'PH',
		tl: 'PH',
		fy: 'NL',
		su: 'SD',
		sw: 'KE',
		te:'IN',
		yi: 'DE',
		lb: 'LU',
		uk: 'UA',
		vi: 'VN',
		bo: 'CN', // 'рџЏґу ЃЈу Ѓ®у Ђµу Ђґу Ѓї',
		fa: 'IR',
		nv: 'US',
		kk: 'KZ',
		lo: 'LA',
		iu: 'CA',
		ny: 'MW',
		ccp: 'BD',
		ceb: 'PH',
		crk: 'CA',
		jv: 'ID',
		jw: 'ID',
		ku: 'TR',
		cs: 'CZ',
		yo : 'NG',
		ti: 'ER',
		ckb: 'IQ',
		uzs: 'UZ',
		ur: 'PK',
		mi: 'MG',
		ne: 'NP',
		or: 'IN',
		ar: 'SA',
		'pt-PT': 'PT',
		'pt-BR': 'BR',
		'zh-HK': 'HK',
		'zh-Hant': 'TW',
		'mni-Mtei': 'IN',
		rhg: 'MM IN'
	}
	var s = '';
	if(lang in lang2flag) {
		s = lang2flag[lang];
		if(s.substr(0, 2) == 'рџЏґ') {
			return s;
		}
	} else if(/^(zh-|hmn|lis)/.test(lang)) {
		// Languages in China
		s = 'CN';
	} else if(/^(mez|oj|one|osa|see|chr|ug)/.test(lang)) {
		// Languages in USA
		s = 'US';
	} else {
		s = lang.toUpperCase();
	}
	var result = '';
	for(var i=0, iMax=s.length; i<iMax; i++) {
		result += (s.charCodeAt(i) != 32) ? '&#x1f1' + (s.charCodeAt(i) + 165).toString(16) + ';' : ' ';
	}
	return result;
}

// https://ssl.gstatic.com/inputtools/js/ln/17/fr.js
const script1 = document.createElement('SCRIPT');
// script1.src = 'fr.js';
script1.src = 'https://ssl.gstatic.com/inputtools/js/ln/17/' + navigator.language.replace(/-.*$/, '') + '.js';
script1.onload = function(params) {
	const select = document.getElementById('lg');
	/*
	const theList = window.LanguageDisplays.nativeNames;
	for(var i in theList) {
		const option = document.createElement('OPTION');
		option.value = i;
		option.textContent = theList[i];
		select.appendChild(option);
	}
	*/

	window.LanguageDisplays.localNames.forEach(function(value) {
		const parts = value.split(':');
		if(/(?:mis|mul|und|zxx)/.test(parts[1])) {
			// special codes : https://en.wikipedia.org/wiki/ISO_639-3#Special_codes
			return;
		}
		const option = document.createElement('OPTION');
		option.value = parts[1];
		option.title = parts[1];
		option.innerHTML = emojiFlag(parts[1]) + ' ' + parts[0] + ' (' + parts[1] + ')';
		select.appendChild(option);
	});
}
document.head.appendChild(script1);
// https://translate.systran.net/javascripts/langs.js
	</script>
